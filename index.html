<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Presupuesto de Financiación - Car One</title>
    <style>
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background-color: #f4f4f4;
            display: flex;
            justify-content: center;
            padding: 20px;
        }
        .container {
            background-color: white;
            width: 100%;
            max-width: 550px;
            padding: 30px;
            box-shadow: 0 0 15px rgba(0,0,0,0.1);
            border-radius: 5px;
        }
        .header {
            text-align: center;
            margin-bottom: 25px;
        }
        /* Ajuste para tu logo carone.png */
        .logo-oficial {
            max-width: 180px;
            height: auto;
            margin-bottom: 15px;
        }
        h1 {
            font-size: 22px;
            text-transform: none;
            color: #333;
            margin: 0;
            border-bottom: none;
        }
        .form-group {
            display: flex;
            margin-bottom: 12px;
            align-items: flex-end;
        }
        .form-group label {
            font-size: 14px;
            margin-right: 8px;
            white-space: nowrap;
            color: #333;
        }
        .form-group input {
            border: none;
            border-bottom: 1px solid #aaa;
            flex-grow: 1;
            padding: 2px 4px;
            outline: none;
            font-size: 14px;
        }
        /* Estilo para imprimir */
        @media print {
            body { background-color: white; padding: 0; }
            .container { box-shadow: none; max-width: 100%; }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <!-- Nombre corregido según tu repositorio -->
        <img src="carone.png" alt="Car One Logo" class="logo-oficial">
        <h1>Presupuesto de Financiación</h1>
    </div>

    <form>
        <div class="form-group"><label>Cliente:</label><input type="text"></div>
        <div class="form-group"><label>Asesor comercial:</label><input type="text"></div>
        <div class="form-group"><label>Modelo a retirar:</label><input type="text"></div>
        <div class="form-group"><label>Valor final:</label><input type="text"></div>
        <div class="form-group"><label>Integración mínima para retirar o usado:</label><input type="text"></div>
        <div class="form-group"><label>Marca:</label><input type="text"></div>
        <div class="form-group"><label>Modelo:</label><input type="text"></div>
        <div class="form-group"><label>Versión:</label><input type="text"></div>
        <div class="form-group"><label>Kilometraje:</label><input type="text"></div>
        <div class="form-group"><label>GNC:</label><input type="text"></div>
        <div class="form-group"><label>Valor de toma:</label><input type="text"></div>
        <div class="form-group"><label>Reserva de unidad:</label><input type="text"></div>
        <div class="form-group"><label>Monto final a financiar:</label><input type="text"></div>
        <div class="form-group"><label>Cantidad de cuotas totales:</label><input type="text"></div>
        <div class="form-group"><label>Valor de Cuotas:</label><input type="text"></div>
       
        <div class="form-group"><label>Tiempo de entrega:</label><input type="text"></div>
        <div class="form-group"><label>Cud:</label><input type="text"></div>
        <div class="form-group"><label>Presupuesto válido hasta:</label><input type="text"></div>
    </form>
</div>

</body>
</html>
