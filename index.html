<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Presupuesto de Financiación - Car One</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f0f0f0;
            display: flex;
            justify-content: center;
            padding: 20px;
        }
        .container {
            background-color: white;
            width: 500px;
            padding: 40px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
        .header {
            text-align: center;
            margin-bottom: 30px;
        }
        .logo-box {
            background-color: #0072bc;
            color: white;
            width: 120px;
            height: 120px;
            margin: 0 auto 10px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            border-radius: 5px;
        }
        .logo-box svg {
            width: 60px;
            fill: white;
        }
        .logo-text {
            font-weight: bold;
            font-size: 24px;
            line-height: 0.9;
        }
        h1 {
            font-size: 22px;
            margin-top: 15px;
        }
        .form-group {
            display: flex;
            margin-bottom: 10px;
            align-items: flex-end;
        }
        .form-group label {
            font-weight: normal;
            white-space: nowrap;
            margin-right: 10px;
        }
        .form-group input {
            border: none;
            border-bottom: 1px solid #999;
            flex-grow: 1;
            padding: 2px 5px;
            outline: none;
            font-size: 14px;
        }
        @media print {
            body { background-color: white; }
            .container { box-shadow: none; width: 100%; }
            input { border-bottom: 1px solid #000 !important; }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <div class="logo-box">
            <svg viewBox="0 0 24 24"><path d="M18.92 6.01C18.72 5.42 18.16 5 17.5 5h-11c-.66 0-1.21.42-1.42 1.01L3 12v8c0 .55.45 1 1 1h1c.55 0 1-.45 1-1v-1h12v1c0 .55.45 1 1 1h1c.55 0 1-.45 1-1v-8l-2.08-5.99zM6.5 16c-.83 0-1.5-.67-1.5-1.5S5.67 13 6.5 13s1.5.67 1.5 1.5S7.33 16 6.5 16zm11 0c-.83 0-1.5-.67-1.5-1.5s.67-1.5 1.5-1.5 1.5.67 1.5 1.5-.67 1.5-1.5 1.5zM5 11l1.5-4.5h11L19 11H5z"/></svg>
            <div class="logo-text">CAR<br>ONE</div>
        </div>
        <h1>Presupuesto de Financiación</h1>
    </div>

    <form>
        <div class="form-group"><label>Cliente:</label><input type="text"></div>
        <div class="form-group"><label>Asesor comercial:</label><input type="text"></div>
        <div class="form-group"><label>Modelo a retirar:</label><input type="text"></div>
        <div class="form-group"><label>Valor final:</label><input type="text"></div>
        <div class="form-group"><label>Integración mínima para retirar o usado:</label><input type="text"></div>
        <div class="form-group"><label>Marca:</label><input type="text"></div>
        <div class="form-group"><label>Modelo:</label><input type="text"></div>
        <div class="form-group"><label>Versión:</label><input type="text"></div>
        <div class="form-group"><label>Kilometraje:</label><input type="text"></div>
        <div class="form-group"><label>GNC:</label><input type="text"></div>
        <div class="form-group"><label>Valor de toma:</label><input type="text"></div>
        <div class="form-group"><label>Reserva de unidad:</label><input type="text"></div>
        <div class="form-group"><label>Monto final a financiar:</label><input type="text"></div>
        <div class="form-group"><label>Cantidad de cuotas totales:</label><input type="text"></div>
        <div class="form-group"><label>Rango de cuotas:</label><input type="text"></div>
        <div class="form-group"><label>Rango de cuotas 1:</label><input type="text"></div>
        <div class="form-group"><label>Entrega pactada:</label><input type="text"></div>
        <div class="form-group"><label>Cud:</label><input type="text"></div>
        <div class="form-group"><label>Presupuesto válido hasta:</label><input type="text"></div>
    </form>
</div>

</body>
</html>
